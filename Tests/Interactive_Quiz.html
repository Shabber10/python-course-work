<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Python Masterclass Quiz</title>
    <!-- Outfity typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.8);
            --primary-color: #58a6ff;
            --success-color: #2ea043;
            --error-color: #f85149;
            --text-color: #c9d1d9;
            --text-heading: #f0f6fc;
            --accent-glow: rgba(88, 166, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(88, 166, 255, 0.08), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(46, 160, 67, 0.05), transparent 400px);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 50px var(--accent-glow);
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--text-heading);
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Selector screen styling */
        .selection-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button.select-btn {
            background: rgba(33, 38, 45, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        button.select-btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
            background: rgba(33, 38, 45, 0.9);
        }

        .dropdown-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select {
            background: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            outline: none;
            cursor: pointer;
        }

        /* Quiz components */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #58a6ff, #2ea043);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .question-box {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-heading);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-card {
            background: rgba(33, 38, 45, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .option-card:hover {
            background: rgba(33, 38, 45, 0.8);
            border-color: #8b949e;
            transform: scale(1.01);
        }

        .option-letter {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--primary-color);
            border: 1px solid var(--border-color);
        }

        .option-text {
            font-size: 1.1rem;
            color: var(--text-color);
        }

        /* Interactive pulse/shake classes */
        .option-card.correct {
            border-color: var(--success-color);
            background: rgba(46, 160, 67, 0.15);
            box-shadow: 0 0 20px rgba(46, 160, 67, 0.2);
            animation: pulse-green 0.5s ease-in-out;
        }

        .option-card.correct .option-letter {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .option-card.incorrect {
            border-color: var(--error-color);
            background: rgba(248, 81, 73, 0.1);
            box-shadow: 0 0 20px rgba(248, 81, 73, 0.15);
            animation: shake-red 0.4s ease-in-out;
        }

        .option-card.incorrect .option-letter {
            background: var(--error-color);
            color: white;
            border-color: var(--error-color);
        }

        /* Next/Submit Button */
        .btn {
            background: linear-gradient(135deg, #58a6ff, #1f6feb);
            border: none;
            color: white;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 166, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Feedback section */
        .feedback-box {
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
        }

        .feedback-title {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .feedback-title.correct-text {
            color: var(--success-color);
        }

        .feedback-title.incorrect-text {
            color: var(--error-color);
        }

        /* Animations */
        @keyframes shake-red {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        @keyframes pulse-green {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Confetti effect */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #2ea043;
            border-radius: 50%;
            animation: fall 1.5s ease-out infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
        }

        /* Summary screen styling */
        .summary-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-heading);
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* Navigation utilities */
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐍 Python Masterclass</h1>
        <p class="subtitle">Interactive Quiz Engine</p>

        <!-- SELECTION SCREEN -->
        <div id="selection-screen" class="selection-screen">
            <div class="btn-group">
                <button class="select-btn" onclick="selectMode('daily')">📅 Practice Daily Tests</button>
                <button class="select-btn" onclick="selectMode('weekly')">🏆 Practice Weekly Tests</button>
            </div>

            <div id="topic-selector-container" class="dropdown-container hide">
                <label for="topic-select" style="font-weight: 600; color: var(--text-heading);">Choose Lesson Topic / Day:</label>
                <select id="topic-select">
                    <!-- Dynamic insertion -->
                </select>
                <button class="btn" style="margin-top: 15px;" onclick="startQuiz()">Start Practicing</button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hide">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            
            <div class="quiz-header">
                <span id="question-index">Question 1 of 10</span>
                <span id="score-counter">Score: 0</span>
            </div>

            <div id="question-box" class="question-box"></div>

            <div id="options-list" class="options-list"></div>

            <div id="feedback-box" class="feedback-box">
                <div id="feedback-title" class="feedback-title">Correct!</div>
                <div id="feedback-desc">Correct answer is init. The constructor function gets called when instantiating the object.</div>
            </div>

            <button id="action-btn" class="btn" onclick="handleAction()">Submit Choice</button>
        </div>

        <!-- SUMMARY SCREEN -->
        <div id="summary-screen" class="summary-card hide">
            <h2 style="font-size: 2rem; color: var(--text-heading);">Practice Complete!</h2>
            <div id="score-circle" class="score-circle">8/10</div>
            <p id="summary-text" style="font-size: 1.2rem; max-width: 500px; line-height: 1.6;">Excellent job! You have a solid grasp of this topic.</p>
            <button class="btn" onclick="restartQuiz()">Practice Again</button>
        </div>
    </div>

    <script>
        // Injected questions database
        const dailyQuestions = [{"id": 1, "type": "MCQ", "question": "Which function is called automatically when an object is created?", "options": [{"label": "A", "text": "del"}, {"label": "B", "text": "new"}, {"label": "C", "text": "init"}, {"label": "D", "text": "str"}], "user_code": "", "marks": "0/1", "difficulty": "easy"}, {"id": 2, "type": "MCQ", "question": "Which of these concepts encourages data hiding in Python?", "options": [{"label": "A", "text": "Variables"}, {"label": "B", "text": "Loops"}, {"label": "C", "text": "Private variables using __"}, {"label": "D", "text": "Functions"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 3, "type": "MCQ", "question": "What typically leads to more memory consumption?", "options": [{"label": "A", "text": "Stack memory"}, {"label": "B", "text": "Procedural functions"}, {"label": "C", "text": "Creating many class instances"}, {"label": "D", "text": "Declaring constants"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 4, "type": "MCQ", "question": "In procedural programming, memory is primarily:", "options": [{"label": "A", "text": "Allocated during runtime"}, {"label": "B", "text": "Object-based"}, {"label": "C", "text": "Function-call-based and mostly stack-driven"}, {"label": "D", "text": "Shared among all functions"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 5, "type": "MCQ", "question": "In Python's Object-Oriented model, if a variable is defined inside a class but outside any methods (a class variable), how is its memory handled?", "options": [{"label": "A", "text": "The memory is only allocated if the variable is accessed by a method"}, {"label": "B", "text": "Each object creates a private copy of the variable in its own memory"}, {"label": "C", "text": "The variable is stored in a temporary cache and deleted after one use"}, {"label": "D", "text": "The memory is shared across all objects created from that class"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 6, "type": "MCQ", "question": "Python is described as a versatile language suitable for artificial intelligence, web development, and data analysis. What helps facilitate this wide range of use cases?", "options": [{"label": "A", "text": "Its design as a low-level language for hardware drivers"}, {"label": "B", "text": "The absence of community support and external documentation"}, {"label": "C", "text": "An extensive standard library and a large ecosystem of third-party frameworks"}, {"label": "D", "text": "The strict limitation to a single programming paradigm"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 7, "type": "MCQ", "question": "Which method is called when you print an object?", "options": [{"label": "A", "text": "print"}, {"label": "B", "text": "display"}, {"label": "C", "text": "str"}, {"label": "D", "text": "show"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 8, "type": "MCQ", "question": "Can Python support both procedural and object-oriented programming?", "options": [{"label": "A", "text": "Yes"}, {"label": "B", "text": "No"}, {"label": "C", "text": "Only procedural"}, {"label": "D", "text": "Only object-oriented"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 9, "type": "MCQ", "question": "According to Python's internal memory management, what is the conceptual relationship between a variable and an object?", "options": [{"label": "A", "text": "Variables and objects are identical components stored in the same memory slot"}, {"label": "B", "text": "Objects are entries in a system table while variables are chunks of memory"}, {"label": "C", "text": "Variables are system table entries that link to objects in memory via pointers"}, {"label": "D", "text": "Variables are stored in the CPU cache while objects are stored on the hard drive"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 10, "type": "MCQ", "question": "What is the file extension for Python files?", "options": [{"label": "A", "text": ".file"}, {"label": "B", "text": ".py"}, {"label": "C", "text": ".ptn"}, {"label": "D", "text": ".pyt"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 11, "type": "MCQ", "question": "How does the Python programming language handle Object-Oriented Programming (OOP) in comparison to languages like Ruby or Java?", "options": [{"label": "A", "text": "OOP is not supported at all"}, {"label": "B", "text": "OOP is an option rather than a requirement"}, {"label": "C", "text": "OOP is only available in specific paid versions"}, {"label": "D", "text": "OOP is mandatory for every project"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 12, "type": "MCQ", "question": "Which feature of the Python language allows a programmer to use variables without explicitly declaring their data types, such as integers or strings, in advance?", "options": [{"label": "A", "text": "Dynamic Typing"}, {"label": "B", "text": "Manual Type Definition"}, {"label": "C", "text": "Static Typing"}, {"label": "D", "text": "Explicit Typing"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 13, "type": "MCQ", "question": "Polymorphism allows:", "options": [{"label": "A", "text": "Classes to have multiple constructors"}, {"label": "B", "text": "One interface, many forms"}, {"label": "C", "text": "Objects to store different types"}, {"label": "D", "text": "Code reuse"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 14, "type": "MCQ", "question": "Which syntax in Python represents object instantiation?", "options": [{"label": "A", "text": "ClassName{}"}, {"label": "B", "text": "new ClassName()"}, {"label": "C", "text": "ClassName()"}, {"label": "D", "text": "create ClassName"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 15, "type": "MCQ", "question": "Which method is used to destroy an object in python?", "options": [{"label": "A", "text": "__Del__"}, {"label": "B", "text": "__delete__"}, {"label": "C", "text": "__end__"}, {"label": "D", "text": "__del__"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 16, "type": "MCQ", "question": "Which built-in method acts like a destructor in Python?", "options": [{"label": "A", "text": "destroy()"}, {"label": "B", "text": "delete()"}, {"label": "C", "text": "del()"}, {"label": "D", "text": "destructor()"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 17, "type": "MCQ", "question": "Which of the following is used for inheritance in Python?", "options": [{"label": "A", "text": "class Child inherits Parent"}, {"label": "B", "text": "class Child(Parent)"}, {"label": "C", "text": "class Child <- Parent"}, {"label": "D", "text": "class Parent : Child"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 18, "type": "MCQ", "question": "When did Guido van Rossum start working on the Python programming language?", "options": [{"label": "A", "text": "1980"}, {"label": "B", "text": "1985"}, {"label": "C", "text": "1989"}, {"label": "D", "text": "1991"}], "user_code": "", "marks": "1/1", "difficulty": "medium"}, {"id": 19, "type": "MCQ", "question": "In terms of language design and developer productivity, how does Python distinguish itself from languages like Java, Ruby, or C++?", "options": [{"label": "A", "text": "Python requires extensive intermediate compile and link steps, which provides a more interactive experience than traditional scripting tools."}, {"label": "B", "text": "Python code is typically three to five times larger than equivalent Java code to ensure it remains readable across platforms."}, {"label": "C", "text": "Python provides a simple syntax where code is often much smaller than equivalent C++ code, and it makes Object-Oriented Programming optional."}, {"label": "D", "text": "Python mandates the use of Object-Oriented Programming (OOP) for every project, making it more structured than C++ or Ruby."}], "user_code": "", "marks": "1/1", "difficulty": "medium"}, {"id": 20, "type": "MCQ", "question": "Python is often referred to as a 'glue' language because of its ability to integrate with other programming languages. How is this feature typically utilized in the software development lifecycle for systems with high-performance requirements?", "options": [{"label": "A", "text": "Python requires all external components to be compiled into Java bytecode before they can be linked to a Python script."}, {"label": "B", "text": "The system must use Visual Basic for the frontend while Python manages the low-level memory allocation of C components."}, {"label": "C", "text": "The system is developed entirely in C and then translated into Python syntax for final user delivery."}, {"label": "D", "text": "The system is initially built in Python to leverage rapid development, and then performance-critical pieces are moved to C for delivery."}], "user_code": "", "marks": "", "difficulty": "easy"}, {"id": 21, "type": "MCQ", "question": "Which of the following is true?", "options": [{"label": "A", "text": "Comments increase execution time"}, {"label": "B", "text": "Comments help in code readability"}, {"label": "C", "text": "Comments are mandatory"}, {"label": "D", "text": "Comments must be inside functions"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 22, "type": "MCQ", "question": "what is the ouput of give code: x = 1 del x x = 2 print(x)", "options": [{"label": "A", "text": "1"}, {"label": "B", "text": "2"}, {"label": "C", "text": "None"}, {"label": "D", "text": "Error"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 23, "type": "MCQ", "question": "Which of the following is not a valid logical operator in Python?", "options": [{"label": "A", "text": "and"}, {"label": "B", "text": "or"}, {"label": "C", "text": "not"}, {"label": "D", "text": "xor"}], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 24, "type": "MCQ", "question": "Which command installs Jupyter Notebook? blic one upon the first external call."}], "user_code": "", "marks": "1/1", "difficulty": "hard"}, {"id": 258, "type": "Coding", "question": "In Python object-oriented programming, what is the specific function of the 'self' parameter during the execution of the __init__ method?", "options": [], "user_code": "", "marks": "1/1", "difficulty": "easy"}, {"id": 259, "type": "Coding", "question": "Write a program that takes an integer input n and checks if it lies within the constraint:1 \u2264 n \u2264 1000 If n satisfies this condition, print:Valid Otherwise, print: Invalid", "options": [], "user_code": "a=int(input())\nif 1<=a<=1000:\n  print(\"Valid\")\nelse:\n  print(\"Invalid\")", "marks": "5/5", "difficulty": "medium"}, {"id": 260, "type": "MCQ", "question": "Create a class Student that stores each student\u2019s name and grade using instance variables. The class should maintain the total number of students and the average grade using class variables. Input Format : First line: An integer N, the number of students. Next N lines: Each line contains a string name and an integer grade. Output Format : First, print the total number of students. Then, print the average grade (rounded to 2 decimal places).", "options": [], "user_code": "", "marks": "10/10", "difficulty": "easy"}, {"id": 261, "type": "MCQ", "question": "In a Python class that uses single inheritance, which function is used to call the constructor (__init__) of the parent class?", "options": [{"label": "A", "text": "super()"}, {"label": "B", "text": "base()"}, {"label": "C", "text": "parent()"}, {"label": "D", "text": "this()"}], "user_code": "", "marks": "1/1", "difficulty": "medium"}, {"id": 262, "type": "MCQ", "question": "In Python OOPS, what is the standard naming convention used to indicate that a method is protected and intended for use only within the class or its subclasses?", "options": [{"label": "A", "text": "Starting the method name with a double underscore, such as __display_info."}, {"label": "B", "text": "Using all capital letters for the method name, such as DISPLAY_INFO."}, {"label": "C", "text": "Starting the method name with a single underscore, such as _display_info."}, {"label": "D", "text": "Ending the method name with a single underscore, such as display_info_."}], "user_code": "", "marks": "1/1", "difficulty": "medium"}, {"id": 263, "type": "MCQ", "question": "Consider a Python program where class 'TeamLead' inherits from class 'Employee' and class 'Project'. If 'Employee' itself inherits from class 'Person', what specific inheritance model does the 'TeamLead' class represent?", "options": [{"label": "A", "text": "Basic Multilevel Inheritance"}, {"label": "B", "text": "Hybrid Inheritance"}, {"label": "C", "text": "Only Multiple Inheritance"}, {"label": "D", "text": "Simple Hierarchical Inheritance"}], "user_code": "", "marks": "1/1", "difficulty": "hard"}, {"id": 264, "type": "MCQ", "question": "What is the result of the following Python code execution? class Student: pass s1 = Student() s2 = Student() s1.name = \"Arjun\" s2.name = \"Arjun\" print(s1 == s2, s1.name == s2.name)", "options": [{"label": "A", "text": "False False"}, {"label": "B", "text": "False True"}, {"label": "C", "text": "True False"}, {"label": "D", "text": "True True"}], "user_code": "", "marks": "1/1", "difficulty": "hard"}, {"id": 265, "type": "Coding", "question": "Consider the following Python class definitions: class Person: def __init__(self, name): self.name = name class Employee(Person): def role(self): return \"Employee\" class Project: def __init__(self, p_name): self.p_name = p_name class TeamLead(Employee, Project): def __init__(self, name, p_name): Employee.__init__(self, name) Project.__init__(self, p_name) Which statement accurately describes the capabilities of an instance of TeamLead?", "options": [], "user_code": "", "marks": "1/1", "difficulty": "medium"}, {"id": 266, "type": "Coding", "question": "You are to implement a class FileMeta that encapsulates sensitive metadata of a file, including its size, last accessed time, and owner. All metadata should be private and cannot be accessed or modified directly. You must provide the following methods with proper encapsulation: set_file_info(size, accessed_time, owner) \u2013 Sets all three values. get_file_info() \u2013 Returns all three metadata values as a tuple. update_size(new_size) \u2013 Updates size only if it is a positive integer. update_accessed_time(new_time) \u2013 Updates last accessed time. change_owner(new_owner) \u2013 Changes the file owner only if it's not an empty string. Input Format : First line: An integer n representing the number of operations. Next n lines: Each line contains one of the following: SET size time owner GET SIZE new_size TIME new_time OWNER new_owner Output Format : For each GET operation, print the file info as : Size: <size>, Accessed: <time>, Owner: <owner>", "options": [], "user_code": "class FileMeta:\n  def __init__(self):\n    self.__size = 0\n    self.__accessed_time = \"\"\n    self.__owner = \"\"\n\n  def set_file_info(self, size, accessed_time, owner):\n    self.__size = int(size)\n    self.__accessed_time = accessed_time\n    self.__owner = owner\n\n  def get_file_info(self):\n    return self.__size, self.__accessed_time, self.__owner\n\n  def update_size(self, new_size):\n    new_size = int(new_size)\n    if new_size > 0:\n      self.__size = new_size\n\n  def update_accessed_time(self, new_time):\n    self.__accessed_time = new_time\n\n  def change_owner(self, new_owner):\n    if new_owner!= \"\":\n      self.__owner = new_owner\n\n\n\nn = int(input())\nfile = FileMeta()\n\n\nfor _ in range(n):\n  parts = input().split() \n  cmd = parts[0]\n\nif cmd == \"SET\":\n  file.set_file_info(parts[1], parts[2], parts[3])\nelif cmd == \"GET\":\n  size, time, owner = file.get_file_info()\n  print(f\"Size: {size}, Accessed: {time}, Owner: {owner}\")\nelif cmd == \"SIZE\":\n  file.update_size(parts[1])\nelif cmd == \"TIME\":\n  file.update_accessed_time(parts[1])\nelif cmd == \"OWNER\":\n  file.change_owner(parts[1])\n\n    \n      \nCorrect Solution\n\nclass FileMeta:\n    def __init__(self):\n        self.__size = 0\n        self.__accessed_time = ''\n        self.__owner = ''\n\n    def set_file_info(self, size, accessed_time, owner):\n        self.__size = size\n        self.__accessed_time = accessed_time\n        self.__owner = owner\n\n    def get_file_info(self):\n        return (self.__size, self.__accessed_time, self.__owner)\n\n    def update_size(self, new_size):\n        if isinstance(new_size, int) and new_size > 0:\n            self.__size = new_size\n\n    def update_accessed_time(self, new_time):\n        self.__accessed_time = new_time\n\n    def change_owner(self, new_owner):\n        if isinstance(new_owner, str) and new_owner.strip() != '':\n            self.__owner = new_owner\n\nn = int(input())\nfile = FileMeta()\nfor _ in range(n):\n    parts = input().split()\n    cmd = parts[0]\n    if cmd == 'SET':\n        size = int(parts[1])\n        time = parts[2]\n        owner = parts[3]\n        file.set_file_info(size, time, owner)\n    elif cmd == 'GET':\n        size, time, owner = file.get_file_info()\n        print(f\"Size: {size}, Accessed: {time}, Owner: {owner}\")\n    elif cmd == 'SIZE':\n        new_size = int(parts[1])\n        file.update_size(new_size)\n    elif cmd == 'TIME':\n        new_time = parts[1]\n        file.update_accessed_time(new_time)\n    elif cmd == 'OWNER':\n        new_owner = parts[1]\n        file.change_owner(new_owner)", "marks": "0/10", "difficulty": "hard"}, {"id": 267, "type": "MCQ", "question": "Design a farm produce management system using hierarchical inheritance. Create a base class Produce with a class variable total_quantity. Create three derived classes: Fruit, Vegetable, and Grain. Each derived class should override the method harvest(quantity: int) which: Adds the harvested quantity to both its own category total and the glo         let currentQuestions = [];
        let answersMap = {};
        let currentIndex = 0;
        let selectedOption = null;
        let submitted = false;
        let score = 0;
        let currentMode = '';

        function selectMode(mode) {
            currentMode = mode;
            const container = document.getElementById('topic-selector-container');
            const select = document.getElementById('topic-select');
            select.innerHTML = '';

            container.classList.remove('hide');

            const topics = mode === 'daily' ? dailyTopics : weeklyTopics;
            
            // Add a random mix option
            const optAll = document.createElement('option');
            optAll.value = 'all';
            optAll.textContent = '🎲 Random Shuffle (15 Questions)';
            select.appendChild(optAll);

            topics.forEach((t, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = t.name;
                select.appendChild(opt);
            });
        }

        function startQuiz() {
            const select = document.getElementById('topic-select');
            const choice = select.value;
            
            const rawQs = currentMode === 'daily' ? dailyQuestions : weeklyQuestions;
            answersMap = currentMode === 'daily' ? dailyAnswers : weeklyAnswers;
            
            // Filter to MCQ only for interactive quiz
            let filterQs = rawQs.filter(q => q.type === 'MCQ');

            if (choice === 'all') {
                // Shuffle and pick 15
                filterQs = filterQs.sort(() => 0.5 - Math.random()).slice(0, 15);
            } else {
                const topic = currentMode === 'daily' ? dailyTopics[choice] : weeklyTopics[choice];
                const [startRange, endRange] = topic.range;
                filterQs = filterQs.filter(q => q.id >= startRange && q.id <= endRange);
            }

            if (filterQs.length === 0) {
                alert('No MCQ questions available in this section yet!');
                return;
            }

            currentQuestions = filterQs;
            currentIndex = 0;
            score = 0;
            submitted = false;
            selectedOption = null;

            document.getElementById('selection-screen').classList.add('hide');
            document.getElementById('quiz-screen').classList.remove('hide');
            
            showQuestion();
        }

        function showQuestion() {
            submitted = false;
            selectedOption = null;
            document.getElementById('feedback-box').style.display = 'none';
            
            const q = currentQuestions[currentIndex];
            
            // Header
            document.getElementById('question-index').textContent = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
            document.getElementById('score-counter').textContent = `Score: ${score}`;
            document.getElementById('progress-bar').style.width = `${(currentIndex / currentQuestions.length) * 100}%`;

            // Question Box
            document.getElementById('question-box').textContent = q.question;

            // Options List
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            q.options.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.onclick = () => selectOption(card, opt.label);

                const letter = document.createElement('div');
                letter.className = 'option-letter';
                letter.textContent = opt.label;

                const text = document.createElement('div');
                text.className = 'option-text';
                text.textContent = opt.text;

                card.appendChild(letter);
                card.appendChild(text);
                list.appendChild(card);
            });

            document.getElementById('action-btn').textContent = 'Submit Choice';
        }

        function selectOption(card, label) {
            if (submitted) return;
            
            // Deselect previous
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => c.style.borderColor = 'rgba(48, 54, 61, 0.8)');

            card.style.borderColor = '#58a6ff';
            selectedOption = label;
        }

        function handleAction() {
            if (submitted) {
                // Go to next question or show summary
                currentIndex++;
                if (currentIndex < currentQuestions.length) {
                    showQuestion();
                } else {
                    showSummary();
                }
            } else {
                if (!selectedOption) {
                    alert('Please select an option first!');
                    return;
                }
                submitChoice();
            }
        }

        function submitChoice() {
            submitted = true;
            const q = currentQuestions[currentIndex];
            const correctAns = answersMap[q.id];
            
            const cards = document.querySelectorAll('.option-card');
            let selectedCard = null;
            let correctCard = null;

            cards.forEach(card => {
                const label = card.querySelector('.option-letter').textContent;
                if (label === selectedOption) selectedCard = card;
                if (label === correctAns) correctCard = card;
            });

            const feedbackBox = document.getElementById('feedback-box');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackDesc = document.getElementById('feedback-desc');

            feedbackBox.style.display = 'block';

            if (selectedOption === correctAns) {
                // Correct!
                score++;
                selectedCard.classList.add('correct');
                feedbackTitle.textContent = '🎉 Correct!';
                feedbackTitle.className = 'feedback-title correct-text';
                
                // Explanatory note
                feedbackDesc.innerHTML = `Great job! Correct answer is indeed option <b>${correctAns}</b>.`;
                
                // Trigger visual confetti effect
                createConfetti(selectedCard);
            } else {
                // Incorrect
                selectedCard.classList.add('incorrect');
                correctCard.classList.add('correct');
                feedbackTitle.textContent = '❌ Incorrect';
                feedbackTitle.className = 'feedback-title incorrect-text';
                feedbackDesc.innerHTML = `Oops! The correct answer is option <b>${correctAns}</b>: "${correctCard.querySelector('.option-text').textContent}".`;
            }

            document.getElementById('action-btn').textContent = currentIndex + 1 < currentQuestions.length ? 'Next Question ⏭️' : 'Finish Quiz 🏁';
        }

        function createConfetti(element) {
            for (let i = 0; i < 20; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                // Random position inside the container
                c.style.left = `${Math.random() * 100}%`;
                c.style.top = `${Math.random() * 50}%`;
                c.style.backgroundColor = ['#2ea043', '#58a6ff', '#bc8cff', '#ffc53d'][Math.floor(Math.random() * 4)];
                c.style.animationDelay = `${Math.random() * 0.5}s`;
                element.appendChild(c);
                setTimeout(() => c.remove(), 2000);
            }
        }

        function showSummary() {
            document.getElementById('quiz-screen').classList.add('hide');
            const screen = document.getElementById('summary-screen');
            screen.classList.remove('hide');

            const percent = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('score-circle').textContent = `${score}/${currentQuestions.length}`;
            
            const summaryText = document.getElementById('summary-text');
            if (percent >= 80) {
                summaryText.textContent = `🏆 Excellent work! You scored ${percent}%. You have fully mastered this topic!`;
            } else if (percent >= 50) {
                summaryText.textContent = `👍 Good effort! You scored ${percent}%. A little more practice and you will get a perfect score!`;
            } else {
                summaryText.textContent = `📖 Keep learning! You scored ${percent}%. Try reading the curriculum markdown files and try this quiz again.`;
            }
        }

        function restartQuiz() {
            document.getElementById('summary-screen').classList.add('hide');
            document.getElementById('selection-screen').classList.remove('hide');
            document.getElementById('topic-selector-container').classList.add('hide');
